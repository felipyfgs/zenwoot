services:
  # Database: PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: wzap_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wzap}
      POSTGRES_USER: ${POSTGRES_USER:-wzap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wzap123}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wzap} -d ${POSTGRES_DB:-wzap}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Storage: MinIO
  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z-cpuv1
    container_name: wzap_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-admin123}
    ports:
      - "${MINIO_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Queue: NATS JetStream
  nats:
    image: nats:2-alpine
    container_name: wzap_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: "-js -m 8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped



volumes:
  postgres_data:
  minio_data:
