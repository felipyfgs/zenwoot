definitions:
  dto.APIResponse:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  dto.BlockContactReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  dto.ChatActionReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  dto.ChatMuteReq:
    properties:
      duration:
        description: mute duration in seconds; 0 = 8 hours default
        type: integer
      jid:
        type: string
    required:
    - jid
    type: object
  dto.CheckContactReq:
    properties:
      phones:
        items:
          type: string
        type: array
    required:
    - phones
    type: object
  dto.CommunityParticipantReq:
    properties:
      communityJid:
        type: string
      participants:
        items:
          type: string
        type: array
    required:
    - communityJid
    - participants
    type: object
  dto.CreateCommunityReq:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  dto.CreateGroupReq:
    properties:
      name:
        example: My Awesome Group
        type: string
      participants:
        example:
        - "5511999999999"
        - "5511888888888"
        items:
          type: string
        type: array
    type: object
  dto.CreateNewsletterReq:
    properties:
      description:
        type: string
      name:
        type: string
      picture:
        type: string
    required:
    - name
    type: object
  dto.CreateWebhookReq:
    properties:
      events:
        items:
          $ref: '#/definitions/model.EventType'
        type: array
      natsEnabled:
        type: boolean
      secret:
        type: string
      url:
        type: string
    required:
    - events
    - url
    type: object
  dto.DeleteMessageReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
    required:
    - messageId
    - phone
    type: object
  dto.EditLabelReq:
    properties:
      color:
        type: integer
      deleted:
        type: boolean
      labelId:
        type: string
      name:
        type: string
    required:
    - labelId
    type: object
  dto.EditMessageReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
      text:
        type: string
    required:
    - messageId
    - phone
    - text
    type: object
  dto.GetAvatarReq:
    properties:
      jid:
        type: string
    required:
    - jid
    type: object
  dto.GetAvatarResp:
    properties:
      id:
        type: string
      url:
        type: string
    type: object
  dto.GetUserInfoReq:
    properties:
      jids:
        items:
          type: string
        type: array
    required:
    - jids
    type: object
  dto.GroupInviteLinkResp:
    properties:
      link:
        type: string
    type: object
  dto.GroupJIDReq:
    properties:
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  dto.GroupJoinReq:
    properties:
      inviteCode:
        type: string
    required:
    - inviteCode
    type: object
  dto.GroupParticipantReq:
    properties:
      action:
        example: add
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  dto.GroupPhotoReq:
    properties:
      groupJid:
        type: string
      photoBase64:
        type: string
    required:
    - groupJid
    - photoBase64
    type: object
  dto.GroupRequestActionReq:
    properties:
      action:
        example: approve
        type: string
      groupJid:
        type: string
      participants:
        example:
        - "5511999999999"
        items:
          type: string
        type: array
    required:
    - action
    - groupJid
    - participants
    type: object
  dto.GroupSettingReq:
    properties:
      enabled:
        type: boolean
      groupJid:
        type: string
    required:
    - groupJid
    type: object
  dto.GroupTextReq:
    properties:
      groupJid:
        type: string
      text:
        type: string
    required:
    - groupJid
    - text
    type: object
  dto.LabelChatReq:
    properties:
      jid:
        type: string
      labelId:
        type: string
    required:
    - jid
    - labelId
    type: object
  dto.LabelMessageReq:
    properties:
      jid:
        type: string
      labelId:
        type: string
      messageId:
        type: string
    required:
    - jid
    - labelId
    - messageId
    type: object
  dto.MarkReadReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
    required:
    - messageId
    - phone
    type: object
  dto.NewsletterMessageReq:
    properties:
      beforeId:
        type: integer
      count:
        type: integer
      newsletterJid:
        type: string
    required:
    - newsletterJid
    type: object
  dto.ReactMessageReq:
    properties:
      messageId:
        type: string
      phone:
        type: string
      reaction:
        type: string
    required:
    - messageId
    - phone
    - reaction
    type: object
  dto.SendContactReq:
    properties:
      name:
        type: string
      phone:
        type: string
      vcard:
        type: string
    required:
    - name
    - phone
    - vcard
    type: object
  dto.SendLinkReq:
    properties:
      description:
        type: string
      phone:
        type: string
      title:
        type: string
      url:
        type: string
    required:
    - phone
    - url
    type: object
  dto.SendLocationReq:
    properties:
      address:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      phone:
        type: string
    required:
    - lat
    - lng
    - phone
    type: object
  dto.SendMediaReq:
    properties:
      base64:
        type: string
      caption:
        type: string
      filename:
        type: string
      mimeType:
        type: string
      phone:
        type: string
    required:
    - mimeType
    - phone
    type: object
  dto.SendPollReq:
    properties:
      name:
        type: string
      options:
        items:
          type: string
        minItems: 2
        type: array
      phone:
        type: string
      selectableCount:
        type: integer
    required:
    - name
    - options
    - phone
    type: object
  dto.SendStickerReq:
    properties:
      base64:
        type: string
      mimeType:
        type: string
      phone:
        type: string
    required:
    - base64
    - mimeType
    - phone
    type: object
  dto.SendTextReq:
    properties:
      phone:
        type: string
      text:
        type: string
    required:
    - phone
    - text
    type: object
  dto.SessionCreateReq:
    properties:
      apiKey:
        type: string
      name:
        type: string
      proxy:
        $ref: '#/definitions/model.SessionProxy'
      settings:
        $ref: '#/definitions/model.SessionSettings'
      webhook:
        $ref: '#/definitions/dto.WebhookCreateInline'
    type: object
  dto.SetPresenceReq:
    properties:
      phone:
        type: string
      presence:
        type: string
    required:
    - phone
    - presence
    type: object
  dto.SetProfilePictureReq:
    properties:
      base64:
        type: string
    required:
    - base64
    type: object
  dto.UserInfoResp:
    properties:
      devices:
        items:
          type: string
        type: array
      jid:
        type: string
      picture:
        type: string
      status:
        type: string
    type: object
  dto.WebhookCreateInline:
    properties:
      events:
        items:
          $ref: '#/definitions/model.EventType'
        type: array
      url:
        type: string
    type: object
  model.EventType:
    enum:
    - All
    - Message
    - UndecryptableMessage
    - MediaRetry
    - Receipt
    - DeleteForMe
    - Connected
    - Disconnected
    - ConnectFailure
    - LoggedOut
    - PairSuccess
    - PairError
    - QR
    - QRScannedWithoutMultidevice
    - StreamError
    - StreamReplaced
    - KeepAliveTimeout
    - KeepAliveRestored
    - ClientOutdated
    - TemporaryBan
    - CATRefreshError
    - ManualLoginReconnect
    - Contact
    - Picture
    - IdentityChange
    - UserAbout
    - PushName
    - BusinessName
    - GroupInfo
    - JoinedGroup
    - Presence
    - ChatPresence
    - Archive
    - Mute
    - Pin
    - Star
    - ClearChat
    - DeleteChat
    - MarkChatAsRead
    - UnarchiveChatsSetting
    - LabelEdit
    - LabelAssociationChat
    - LabelAssociationMessage
    - CallOffer
    - CallAccept
    - CallTerminate
    - CallOfferNotice
    - CallRelayLatency
    - CallPreAccept
    - CallReject
    - CallTransport
    - UnknownCallEvent
    - NewsletterJoin
    - NewsletterLeave
    - NewsletterMuteChange
    - NewsletterLiveUpdate
    - HistorySync
    - AppState
    - AppStateSyncComplete
    - AppStateSyncError
    - OfflineSyncCompleted
    - OfflineSyncPreview
    - PrivacySettings
    - PushNameSetting
    - UserStatusMute
    - BlocklistChange
    - Blocklist
    type: string
    x-enum-varnames:
    - EventAll
    - EventMessage
    - EventUndecryptableMessage
    - EventMediaRetry
    - EventReceipt
    - EventDeleteForMe
    - EventConnected
    - EventDisconnected
    - EventConnectFailure
    - EventLoggedOut
    - EventPairSuccess
    - EventPairError
    - EventQR
    - EventQRScannedWithoutMultidevice
    - EventStreamError
    - EventStreamReplaced
    - EventKeepAliveTimeout
    - EventKeepAliveRestored
    - EventClientOutdated
    - EventTemporaryBan
    - EventCATRefreshError
    - EventManualLoginReconnect
    - EventContact
    - EventPicture
    - EventIdentityChange
    - EventUserAbout
    - EventPushName
    - EventBusinessName
    - EventGroupInfo
    - EventJoinedGroup
    - EventPresence
    - EventChatPresence
    - EventArchive
    - EventMute
    - EventPin
    - EventStar
    - EventClearChat
    - EventDeleteChat
    - EventMarkChatAsRead
    - EventUnarchiveChatsSetting
    - EventLabelEdit
    - EventLabelAssociationChat
    - EventLabelAssociationMessage
    - EventCallOffer
    - EventCallAccept
    - EventCallTerminate
    - EventCallOfferNotice
    - EventCallRelayLatency
    - EventCallPreAccept
    - EventCallReject
    - EventCallTransport
    - EventUnknownCallEvent
    - EventNewsletterJoin
    - EventNewsletterLeave
    - EventNewsletterMuteChange
    - EventNewsletterLiveUpdate
    - EventHistorySync
    - EventAppState
    - EventAppStateSyncComplete
    - EventAppStateSyncError
    - EventOfflineSyncCompleted
    - EventOfflineSyncPreview
    - EventPrivacySettings
    - EventPushNameSetting
    - EventUserStatusMute
    - EventBlocklistChange
    - EventBlocklist
  model.SessionProxy:
    properties:
      host:
        type: string
      password:
        type: string
      port:
        type: integer
      protocol:
        type: string
      username:
        type: string
    type: object
  model.SessionSettings:
    properties:
      alwaysOnline:
        type: boolean
      ignoreGroups:
        type: boolean
      ignoreStatus:
        type: boolean
      msgRejectCall:
        type: string
      readMessages:
        type: boolean
      rejectCall:
        type: boolean
    type: object
info:
  contact:
    name: wzap Support
    url: https://github.com/galvaofelipe421-wq/fiozap
  description: WhatsApp Multi-Session API powered by wzap
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/galvaofelipe421-wq/fiozap
  title: wzap API
  version: "1.0"
paths:
  /health:
    get:
      description: Returns the health status of the API and its dependencies
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      summary: Health check
      tags:
      - Health
  /sessions:
    get:
      description: Returns all sessions
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: List sessions (Admin Only)
      tags:
      - Sessions
    post:
      consumes:
      - application/json
      description: Creates a new session with an auto-generated or custom apiKey
      parameters:
      - description: Session data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SessionCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Create a new session (Admin Only)
      tags:
      - Sessions
  /sessions/{sessionId}:
    delete:
      description: Disconnects and deletes the session
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Delete session
      tags:
      - Sessions
    get:
      description: Returns the session identified by :sessionId (name or id)
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Get session
      tags:
      - Sessions
  /sessions/{sessionId}/chat/archive:
    post:
      consumes:
      - application/json
      description: Archives a chat identified by JID, moving it out of the main chat
        list
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Archive a chat
      tags:
      - Chat
  /sessions/{sessionId}/chat/mute:
    post:
      consumes:
      - application/json
      description: Mutes notifications for a chat identified by JID
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Chat mute payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatMuteReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Mute a chat
      tags:
      - Chat
  /sessions/{sessionId}/chat/pin:
    post:
      consumes:
      - application/json
      description: Pins a chat to the top of the chat list
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Pin a chat
      tags:
      - Chat
  /sessions/{sessionId}/chat/unarchive:
    post:
      consumes:
      - application/json
      description: Moves a chat back to the main chat list
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Unarchive a chat
      tags:
      - Chat
  /sessions/{sessionId}/chat/unmute:
    post:
      consumes:
      - application/json
      description: Restores notifications for a muted chat
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Unmute a chat
      tags:
      - Chat
  /sessions/{sessionId}/chat/unpin:
    post:
      consumes:
      - application/json
      description: Removes a chat from the pinned position at the top of the chat
        list
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Chat JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ChatActionReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Unpin a chat
      tags:
      - Chat
  /sessions/{sessionId}/community/create:
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp Community (a group of groups) with a name
        and optional description
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Community payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateCommunityReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Create a community
      tags:
      - Community
  /sessions/{sessionId}/community/participant/add:
    post:
      consumes:
      - application/json
      description: Adds one or more subgroups (by JID) as participants to an existing
        community
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Add subgroup to community
      tags:
      - Community
  /sessions/{sessionId}/community/participant/remove:
    post:
      consumes:
      - application/json
      description: Removes one or more subgroups (by JID) from an existing community
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Community participant payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CommunityParticipantReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Remove subgroup from community
      tags:
      - Community
  /sessions/{sessionId}/connect:
    post:
      description: Connects a WhatsApp session (starts pairing if new)
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Connect session
      tags:
      - Sessions
  /sessions/{sessionId}/contacts:
    get:
      description: Returns all contacts from the WhatsApp session
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: List contacts
      tags:
      - Contacts
  /sessions/{sessionId}/contacts/avatar:
    post:
      consumes:
      - application/json
      description: Fetches the profile picture URL and picture ID for the given WhatsApp
        JID
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.GetAvatarReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/dto.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/dto.GetAvatarResp'
              type: object
      security:
      - ApiKey: []
      summary: Get contact avatar
      tags:
      - Contacts
  /sessions/{sessionId}/contacts/block:
    post:
      consumes:
      - application/json
      description: Blocks a WhatsApp contact by JID, preventing them from sending
        messages
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: JID payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.BlockContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Block a contact
      tags:
      - Contacts
  /sessions/{sessionId}/contacts/blocklist:
    get:
      description: Returns the full list of JIDs currently blocked by the session
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Get blocked contacts list
      tags:
      - Contacts
  /sessions/{sessionId}/contacts/check:
    post:
      consumes:
      - application/json
      description: Checks if phone numbers are registered on WhatsApp
      parameters:
      - description: Session name or ID
        in: path
        name: sessionId
        required: true
        type: string
      - description: Phone numbers
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CheckContactReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.APIResponse'
      security:
      - ApiKey: []
      summary: Check contacts on WhatsApp
      tags:
      - Contacts
  /sessions/{sessionId}/contacts/info:
    post:
